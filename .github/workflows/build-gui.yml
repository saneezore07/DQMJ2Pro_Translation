name: Build GUI Patcher

on:
  workflow_dispatch:
  push:
    paths:
      - "GUI/**"
      - "Pro_Tools/**"
      - "Translation/**"
      - "Database/**"
      - ".github/workflows/build-gui.yml"

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Prepare bundled tools
        run: |
          Copy-Item Pro_Tools/blz_win.exe Pro_Tools/blz.exe
          New-Item -ItemType Directory -Force GUI/bundled/tools/windows
          Copy-Item Database/ndstool.exe GUI/bundled/tools/windows/ndstool.exe
          Copy-Item Database/windows_dlls/*.dll GUI/bundled/tools/windows/ -ErrorAction SilentlyContinue

      - name: Prepare bundle
        run: python GUI/make_bundle.py

      - name: Build Windows exe
        run: |
          python -m PyInstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name DQMJ2Patcher `
            --hidden-import json `
            --hidden-import csv `
            --hidden-import struct `
            --add-data "GUI/bundled;bundled" `
            GUI/patcher_gui.py

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: DQMJ2Patcher-windows-x86_64
          path: dist/DQMJ2Patcher.exe

  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk wget fuse file

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Prepare bundle
        run: python GUI/make_bundle.py

      - name: Build Linux executable
        run: |
          python -m PyInstaller \
            --noconfirm \
            --onefile \
            --windowed \
            --name DQMJ2Patcher \
            --hidden-import json \
            --hidden-import csv \
            --hidden-import struct \
            --add-data "GUI/bundled:bundled" \
            GUI/patcher_gui.py

      - name: Make AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/DQMJ2Patcher AppDir/usr/bin/DQMJ2Patcher

          cat > AppDir/AppRun <<'SH'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/DQMJ2Patcher" "$@"
          SH
          chmod +x AppDir/AppRun

          cat > AppDir/DQMJ2Patcher.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=DQMJ2Patcher
          Exec=DQMJ2Patcher
          Icon=DQMJ2Patcher
          Categories=Game;Utility;
          Terminal=false
          EOF

          python - <<'PY'
          from pathlib import Path
          Path("AppDir/DQMJ2Patcher.png").write_bytes(bytes.fromhex(
              "89504e470d0a1a0a0000000d4948445200000001000000010806000000"
              "1f15c4890000000a49444154789c63000100000500010d0a2db40000000049454e44ae426082"
          ))
          PY

          wget -O appimagetool-x86_64.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir DQMJ2Patcher-x86_64.AppImage

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: DQMJ2Patcher-linux-x86_64-AppImage
          path: DQMJ2Patcher-x86_64.AppImage
