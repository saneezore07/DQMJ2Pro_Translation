name: Build GUI Patcher

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "gui-v*"
    paths:
      - "Database/GUI_Patcher/GUI/**"
      - "Pro_Tools/**"
      - "Translation/**"
      - "Database/**"
      - ".github/workflows/build-gui.yml"

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read patcher version
        id: version
        shell: bash
        run: |
          VERSION=$(python -c 'import re; from pathlib import Path; s=Path("Database/GUI_Patcher/GUI/patcher_gui.py").read_text(); print("v"+re.search(r"PATCHER_VERSION = \"([^\"]+)\"", s).group(1))')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller tkinterdnd2

      - name: Prepare bundled tools
        shell: pwsh
        run: |
          Copy-Item Pro_Tools/blz_win.exe Pro_Tools/blz.exe
          New-Item -ItemType Directory -Force Database/GUI_Patcher/GUI/bundled/tools/windows
          Copy-Item Database/ndstool.exe Database/GUI_Patcher/GUI/bundled/tools/windows/ndstool.exe
          Copy-Item Database/windows_dlls/*.dll Database/GUI_Patcher/GUI/bundled/tools/windows/ -ErrorAction SilentlyContinue

      - name: Prepare bundle
        run: python Database/GUI_Patcher/GUI/make_bundle.py

      - name: Build Windows exe
        run: |
          python -m PyInstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name DQMJ2Patcher `
            --hidden-import tkinterdnd2 `
            --hidden-import json `
            --hidden-import csv `
            --hidden-import struct `
            --hidden-import randomizer.pro_randomizer `
            --add-data "Database/GUI_Patcher/GUI/bundled;bundled" `
            --add-data "Database/GUI_Patcher/GUI/splash;splash" `
            --add-data "Database/GUI_Patcher/GUI/randomizer;randomizer" `
            Database/GUI_Patcher/GUI/patcher_gui.py

      - name: Rename Windows release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets
          Copy-Item dist/DQMJ2Patcher.exe "release-assets/DQMJ2PPatcher-${{ steps.version.outputs.version }}-x86_64-windows.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: DQMJ2PPatcher-${{ steps.version.outputs.version }}-x86_64-windows
          path: release-assets/DQMJ2PPatcher-${{ steps.version.outputs.version }}-x86_64-windows.exe

  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read patcher version
        id: version
        shell: bash
        run: |
          VERSION=$(python -c 'import re; from pathlib import Path; s=Path("Database/GUI_Patcher/GUI/patcher_gui.py").read_text(); print("v"+re.search(r"PATCHER_VERSION = \"([^\"]+)\"", s).group(1))')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk wget fuse file

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller tkinterdnd2

      - name: Prepare bundle
        run: |
          gcc Pro_Tools/blz_linux.c -O2 -o Pro_Tools/blz.exe
          chmod +x Pro_Tools/blz.exe
          python Database/GUI_Patcher/GUI/make_bundle.py
          ls -lh Database/GUI_Patcher/GUI/bundled/repo/Pro_Tools/blz*
          file Database/GUI_Patcher/GUI/bundled/repo/Pro_Tools/blz.exe

      - name: Build Linux executable
        run: |
          python -m PyInstaller \
            --noconfirm \
            --onefile \
            --windowed \
            --name DQMJ2Patcher \
            --hidden-import tkinterdnd2 \
            --hidden-import json \
            --hidden-import csv \
            --hidden-import struct \
            --hidden-import randomizer.pro_randomizer \
            --add-data "Database/GUI_Patcher/GUI/bundled:bundled" \
            --add-data "Database/GUI_Patcher/GUI/splash:splash" \
            --add-data "Database/GUI_Patcher/GUI/randomizer:randomizer" \
            Database/GUI_Patcher/GUI/patcher_gui.py

      - name: Make AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/DQMJ2Patcher AppDir/usr/bin/DQMJ2Patcher

          cat > AppDir/AppRun <<'SH'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/DQMJ2Patcher" "$@"
          SH
          chmod +x AppDir/AppRun

          cat > AppDir/DQMJ2Patcher.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=DQMJ2Patcher
          Exec=DQMJ2Patcher
          Icon=DQMJ2Patcher
          Categories=Game;Utility;
          Terminal=false
          EOF

          python - <<'PY'
          from pathlib import Path
          Path("AppDir/DQMJ2Patcher.png").write_bytes(bytes.fromhex(
              "89504e470d0a1a0a0000000d4948445200000001000000010806000000"
              "1f15c4890000000a49444154789c63000100000500010d0a2db40000000049454e44ae426082"
          ))
          PY

          wget -O appimagetool-x86_64.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir DQMJ2PPatcher-${{ steps.version.outputs.version }}-x86_64-linux.AppImage

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: DQMJ2PPatcher-${{ steps.version.outputs.version }}-x86_64-linux
          path: DQMJ2PPatcher-${{ steps.version.outputs.version }}-x86_64-linux.AppImage

  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read patcher version
        id: version
        shell: bash
        run: |
          VERSION=$(python -c 'import re; from pathlib import Path; s=Path("Database/GUI_Patcher/GUI/patcher_gui.py").read_text(); print("v"+re.search(r"PATCHER_VERSION = \"([^\"]+)\"", s).group(1))')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller tkinterdnd2

      - name: Build macOS ndstool
        run: |
          git clone https://codeberg.org/blocksds/ndstool.git /tmp/ndstool
          cd /tmp/ndstool
          make clean
          make
          mkdir -p "$GITHUB_WORKSPACE/Database/GUI_Patcher/GUI/bundled/tools/macos"
          cp ndstool "$GITHUB_WORKSPACE/Database/GUI_Patcher/GUI/bundled/tools/macos/ndstool"
          chmod +x "$GITHUB_WORKSPACE/Database/GUI_Patcher/GUI/bundled/tools/macos/ndstool"

      - name: Prepare bundle
        run: |
          clang Pro_Tools/blz_linux.c -O2 -o Pro_Tools/blz.exe
          chmod +x Pro_Tools/blz.exe
          python Database/GUI_Patcher/GUI/make_bundle.py
          ls -lh Database/GUI_Patcher/GUI/bundled/repo/Pro_Tools/blz*
          file Database/GUI_Patcher/GUI/bundled/repo/Pro_Tools/blz.exe
          file Database/GUI_Patcher/GUI/bundled/tools/macos/ndstool

      - name: Build macOS app
        run: |
          python -m PyInstaller \
            --noconfirm \
            --windowed \
            --name DQMJ2Patcher \
            --hidden-import tkinterdnd2 \
            --hidden-import json \
            --hidden-import csv \
            --hidden-import struct \
            --hidden-import randomizer.pro_randomizer \
            --add-data "Database/GUI_Patcher/GUI/bundled:bundled" \
            --add-data "Database/GUI_Patcher/GUI/splash:splash" \
            --add-data "Database/GUI_Patcher/GUI/randomizer:randomizer" \
            Database/GUI_Patcher/GUI/patcher_gui.py

      - name: Zip macOS app
        run: |
          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent dist/DQMJ2Patcher.app release-assets/DQMJ2PPatcher-${{ steps.version.outputs.version }}-x86_64-macos.zip

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: DQMJ2PPatcher-${{ steps.version.outputs.version }}-x86_64-macos
          path: release-assets/DQMJ2PPatcher-${{ steps.version.outputs.version }}-x86_64-macos.zip

  publish-release:
    name: Publish GitHub Release assets
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/gui-v')
    permissions:
      contents: write

    steps:
      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "DQMJ2P Patcher ${TAG#gui-}" --notes ""
          gh release upload "$TAG" release-assets/* --clobber
