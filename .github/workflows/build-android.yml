name: Build Android Prototype

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev
          python -m pip install --upgrade pip
          python -m pip install buildozer cython

      - name: Ensure Android requirements
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path("Database/GUI_Patcher/Android/buildozer.spec")
          s = p.read_text()
          s = s.replace("requirements = python3,kivy", "requirements = python3,kivy,pillow")
          p.write_text(s)
          PY

      - name: Build Android debug APK
        working-directory: Database/GUI_Patcher/Android
        run: |
          buildozer android debug

      - name: Package release assets
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p release-assets

          cp Database/GUI_Patcher/Android/bin/*.apk \
            "release-assets/DQMJ2Patcher-${VERSION}-android-debug.apk"

          zip -r "release-assets/DQMJ2Patcher-${VERSION}-android-prototype-source.zip" \
            Database/GUI_Patcher/Android \
            Database/GUI_Patcher/GUI \
            Database \
            Pro_Tools \
            Translation \
            README.md \
            -x "*.git*" "*__pycache__*" "*.pyc"

      - name: Publish Android prototype release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          gh release delete "$TAG" --yes --cleanup-tag=false || true

          gh release create "$TAG" \
            release-assets/* \
            --title "DQMJ2P Android Prototype $TAG" \
            --notes "Experimental Android prototype APK for testing." \
            --prerelease \
            --target "$GITHUB_SHA"
