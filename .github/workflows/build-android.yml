name: Build Android Prototype

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.6"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            zip unzip openjdk-17-jdk \
            autoconf automake autoconf-archive libtool libtool-bin libltdl-dev m4 gettext pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev
          python -m pip install --upgrade pip
          python -m pip install "buildozer==1.5.0" "python-for-android==2024.1.21" "cython<3"

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p "$HOME/.buildozer/android/platform/android-sdk/licenses"
          printf '%s\n' \
            '8933bad161af4178b1185d1a37fbf41ea5269c55d' \
            'd56f5187479451eabf01fb78af6dfcb131a6481e' \
            '24333f8a63b6825ea9c5514f83c2829b004d1fee' \
            > "$HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license"

          mkdir -p "$ANDROID_HOME/licenses"
          cp "$HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license" \
            "$ANDROID_HOME/licenses/android-sdk-license"

          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;37.0.0" \
            "platform-tools"

      - name: Ensure Android requirements
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path("Database/GUI_Patcher/Android/buildozer.spec")
          s = p.read_text()
          s = s.replace("requirements = python3,kivy", "requirements = python3,kivy,pillow")
          p.write_text(s)
          PY

      - name: Build Android debug APK
        working-directory: Database/GUI_Patcher/Android
        env:
          ACLOCAL_PATH: /usr/share/aclocal
        run: |
          mkdir -p "$HOME/.buildozer/android/platform/android-sdk/tools/bin"
          ln -sf "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "$HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager"
          ln -sf "$ANDROID_HOME/cmdline-tools/latest/bin/avdmanager" \
            "$HOME/.buildozer/android/platform/android-sdk/tools/bin/avdmanager"

          set +e
          export CFLAGS="${CFLAGS:-} -Wno-error=implicit-function-declaration"
          export CPPFLAGS="${CPPFLAGS:-} -Wno-error=implicit-function-declaration"

          buildozer -v android debug 2>&1 | tee buildozer-build.log
          code="${PIPESTATUS[0]}"

          if grep -q "remote_debugging.h.*preadv\|remote_debugging.c.*pwritev\|implicit-function-declaration" buildozer-build.log; then
            echo "Retrying after patching Python remote debugging preadv/pwritev probes..."
            for f in $(find .buildozer/android/platform/build-arm64-v8a -path '*python3*' \( -name 'remote_debugging.h' -o -name 'remote_debugging.c' \)); do
              echo "patching $f"
              sed -i 's/preadv/python_preadv_disabled/g; s/pwritev/python_pwritev_disabled/g' "$f"
            done
            buildozer -v android debug 2>&1 | tee -a buildozer-build.log
            code="${PIPESTATUS[0]}"
          fi
          code="${PIPESTATUS[0]}"

          echo "===== LAST 220 BUILDOZER LOG LINES ====="
          tail -220 buildozer-build.log

          echo "===== ERROR/WARNING SEARCH ====="
          grep -nEi "error:|fatal:|failed|exception|traceback|no such file|not found" buildozer-build.log | tail -80 || true

          exit "$code"

      - name: Package release assets
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p release-assets

          echo "Searching for APK outputs..."
          find Database/GUI_Patcher/Android -name "*.apk" -type f -print

          APK="$(find Database/GUI_Patcher/Android -name "*.apk" -type f | head -n 1)"

          if [ -z "$APK" ]; then
            echo "No APK found after buildozer; trying Gradle assembleDebug directly..."
            DIST="$(find Database/GUI_Patcher/Android/.buildozer/android/platform/build-arm64-v8a/dists -maxdepth 2 -name gradlew -type f | head -n 1)"
            if [ -n "$DIST" ]; then
              DIST_DIR="$(dirname "$DIST")"
              echo "Gradle dist: $DIST_DIR"
              chmod +x "$DIST"
              (cd "$DIST_DIR" && ./gradlew assembleDebug --stacktrace)
            fi
          fi

          echo "Searching for APK outputs after Gradle fallback..."
          find Database/GUI_Patcher/Android -name "*.apk" -type f -print

          APK="$(find Database/GUI_Patcher/Android -name "*.apk" -type f | head -n 1)"
          if [ -z "$APK" ]; then
            echo "No APK found"
            find Database/GUI_Patcher/Android -type f | sort | tail -300
            exit 1
          fi

          echo "Using APK: $APK"
          cp "$APK" "release-assets/DQMJ2Patcher-${VERSION}-android-debug.apk"

          zip -r "release-assets/DQMJ2Patcher-${VERSION}-android-prototype-source.zip" \
            Database/GUI_Patcher/Android \
            Database/GUI_Patcher/GUI \
            Database \
            Pro_Tools \
            Translation \
            README.md \
            -x "*.git*" "*__pycache__*" "*.pyc" "*.apk"

      - name: Publish Android prototype release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          gh release delete "$TAG" --yes --cleanup-tag=false || true

          gh release create "$TAG" \
            release-assets/* \
            --title "DQMJ2P Android Prototype $TAG" \
            --notes "Experimental Android prototype APK for testing." \
            --prerelease \
            --target "$GITHUB_SHA"
