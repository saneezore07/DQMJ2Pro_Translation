name: Build Android Prototype

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11.6
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.6"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            zip unzip openjdk-17-jdk \
            autoconf automake autoconf-archive libtool libtool-bin libltdl-dev m4 gettext pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev
          python -m pip install --upgrade pip
          python -m pip install "buildozer==1.5.0" "python-for-android==2024.1.21" "cython<3"

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p "$HOME/.buildozer/android/platform/android-sdk/licenses"
          printf '%s\n' \
            '8933bad161af4178b1185d1a37fbf41ea5269c55d' \
            'd56f5187479451eabf01fb78af6dfcb131a6481e' \
            '24333f8a63b6825ea9c5514f83c2829b004d1fee' \
            > "$HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license"

          mkdir -p "$ANDROID_HOME/licenses"
          cp "$HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license" \
            "$ANDROID_HOME/licenses/android-sdk-license"

          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;37.0.0" \
            "platform-tools"

      - name: Build Android debug APK directly with p4a
        working-directory: Database/GUI_Patcher/Android
        run: |
          APP_VERSION="${GITHUB_REF_NAME#android-v}"

          python -m pythonforandroid.toolchain apk \
            --private "$PWD" \
            --package org.dqmj2protranslation.dqmj2patcher \
            --name DQMJ2Patcher \
            --version "$APP_VERSION" \
            --bootstrap sdl2 \
            --requirements python3,kivy,pillow \
            --arch arm64-v8a \
            --sdk-dir "$ANDROID_HOME" \
            --ndk-dir "$ANDROID_NDK_ROOT" \
            --android-api 35 \
            --ndk-api 23 \
            --permission READ_EXTERNAL_STORAGE \
            --permission WRITE_EXTERNAL_STORAGE \
            --debug \
            --color always 2>&1 | tee p4a-apk-build.log

          echo "APK search after p4a:"
          find "$GITHUB_WORKSPACE" "$HOME" -name "*.apk" -type f -print || true

      - name: Package release assets
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p release-assets

          echo "Searching entire runner for APK outputs..."
          find "$GITHUB_WORKSPACE" "$HOME" -name "*.apk" -type f -print || true

          APK="$(find "$GITHUB_WORKSPACE" "$HOME" -name "*.apk" -type f | head -n 1)"
          if [ -z "$APK" ]; then
            echo "No APK found anywhere; failing because APK output is required."
            find "$GITHUB_WORKSPACE" "$HOME" -maxdepth 8 -type d | grep -Ei 'buildozer|python-for-android|dist|dists|bin|apk|gradle|dqmj' | sort | tail -300 || true
            find "$GITHUB_WORKSPACE" "$HOME" -name "*build*.log" -o -name "*.log" -o -name "gradlew" -o -name "build.gradle" | sort | tail -300 || true
            exit 1
          fi

          echo "Using APK: $APK"
          cp "$APK" "release-assets/DQMJ2Patcher-${VERSION}-android-debug.apk"

          zip -r "release-assets/DQMJ2Patcher-${VERSION}-android-prototype-source.zip" \
            Database/GUI_Patcher/Android \
            Database/GUI_Patcher/GUI \
            Database \
            Pro_Tools \
            Translation \
            README.md \
            -x "*.git*" "*__pycache__*" "*.pyc" "*.apk"

      - name: Publish Android prototype release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          gh release delete "$TAG" --yes --cleanup-tag=false || true

          gh release create "$TAG" \
            release-assets/* \
            --title "DQMJ2P Android Prototype $TAG" \
            --notes "Experimental Android prototype APK for testing." \
            --prerelease \
            --target "$GITHUB_SHA"
